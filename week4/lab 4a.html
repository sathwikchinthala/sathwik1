<!DOCTYPE html>
<html>
    <head>
        <title>Student Information Form</title>
    <body style="background-color: rgb(134, 134, 236);">
        
        <h1  style="color: rgb(255, 0, 0); background-color:rgb(244, 242, 249); text-align: center;font-family: Arial; border: 5px solid black;">STUDENT INFORMATION</h1>
        <table  border="1" align="center" style="width: 50%; background-color:rgb(211, 211, 162); text-align: center; font-family: Arial;"cellspacing="0" cellpadding="10">
            <tr>
                <th>Full Name</th>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <th>email</th>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <th>Phone Number</th>
                <td><input type="tel" id="phone"></td>
            </tr>
            <tr>
                <th>Gender</th>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>

                </td>
            </tr>
            <tr>
                <th>Course</th>
                <td>
                    <select id="course">
                        <option value="b tech">b tech</option>
                        <option value="mbbs">mbbs</option>
                        <option value="phd">Phd</option>
                        <option value="degree">degree</option>
                    </select>

                </td>
            </tr>
            <th>Hobbies</th>
            <td>
                <input type="checkbox" id="reading" name="hobby" value="reading">
                <label for="reading">Reading</label>
                <input type="checkbox" id="traveling" name="hobby" value="traveling">
                <label for="traveling">Traveling</label>
                <input type="checkbox" id="sports" name="hobby" value="sports">
                <label for="sports">Sports</label>
                <input type="checkbox" id="music" name="hobby" value="music">
                <label for="music">Music</label>
            </td>
            <tr>
                <th>Date of Birth</th>
                <td><input type="date" id="dob"></td>
            </tr>
            <tr>
                <th> upload certificate</th>
                <td><input type="file" id="certificate"></td>
            </tr>
            <tr>
                <th>Address</th>
                <td>
                    <textarea id="address" rows="4" cols="30"></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>

        </table>
    </body>
</html>
