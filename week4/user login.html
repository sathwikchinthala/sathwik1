<!DOCTYPE html>
<html>
    <head>
        <title>User Login</title>
    </head>
    <body style="background-color: rgb(251, 251, 252);">
        <h1 style="color: rgb(23, 23, 23); background-color:rgb(244, 242, 249); text-align: center;font-family: Arial;">USER LOGIN</h1>
        <table  border="1" align="center" style="width: 50%; background-color:rgb(146, 231, 239); text-align: center; font-family: Arial;"cellspacing="0" cellpadding="10">
            <tr>
                <th>USER NAME</th>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <th>PASSWORD</th>
                <td><input type="password" id="password"></td>
            </tr>
            <tr>
                <td colspan="2"><button style="background-color: rgb(255, 0, 0);border: 3px solid rgb(0, 0, 0);" type="submit">Login</button></td>
    </body>
