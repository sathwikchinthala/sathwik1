<!DOCTYPE html>
<html>
    <head>
        <Style>
            .container{
                 display:grid;
                 grid-template-rows:auto auto 1fr auto;
                 grid-template-columns:300px 1fr;
                 grid-template-areas:
                        "header header"
                        "sale sale"
                       "sidebar products"
                       "footer footer";
                 padding:10px; 
                 gap:20px;
                 height: 100vh;     
            }
            .header{
                grid-area:header;
                background-color:rgb(99, 105, 222);
                color:rgb(1, 1, 21);
                margin:0;
                display:flex;
                justify-content:center;
                text-align:center;
                padding:10px;
                gap: 10px;
                font-size:larger;
            }
            .sale{
               grid-area:sale;
               background-color:rgb(99, 214, 214);
               color:brown;
                margin:0;
               display:flex;
               justify-content:center;
               text-align:center;
               padding:10px;
              font-size:larger;
            }
            .sidebar{
               grid-area:sidebar;
               background-color:white;
               color:black;
               padding:20px;
               margin:0;
               border:3px solid;
               gap:20px;
               font-size:larger;
            }
            .sidebar h3{
                margin-top: 0;
            }
            .products{
                display:grid;
                grid-area:products;
                grid-template-rows:1fr 1fr;
                grid-template-columns:repeat(2,1fr);
                gap:10px;
                padding:20px;
                border:3px solid;  
            }
            .products iframe{
                height:100%;
                width:100%;
                border:none;
            }
            .footer{
               bottom:0;
               grid-area:footer;
               background-color:rgb(119, 199, 143);
               color:black;
               text-align:center;
               margin:0;
               font-size:larger;
            }
            .items{
                border:3px solid rgb(21, 2, 21);
            }

        </Style>
    </head>
    <body  style="background-color:lavenderblush;">
        <div class="container">
            <div class="header" style="font-family:Georgia, 'Times New Roman'">BRAND HUB</div>
            <div class="sale">Ultimate Savings Event – Up to 50% OFF | While Stocks Last!</div>
            <div class="sidebar" style="background-color:lavenderblush;">
                <h3>Categories</h3>
                <p> * Electronics</p>
                <p> * Home Appliances</p>
                <p> * Books</p>
                <p> * Clothing</p>
            </div>
            <div class="products">
                <div class="items">
                    <img src="vivox200.jpg" height="100" width="100">
                    <h3 style="font-family:Georgia, 'Times New Roman',">vivo X 200</h3>
                    <p>Price:$34.56</p>
                    <button>Add to wishlist</button>
                </div>
                <div class="items">
                    <img src="tab.png" height="100" width="100">
                    <h3  style="font-family:Georgia, 'Times New Roman',">TAB</h3>
                    <p>price:$5.89</p>
                    <button>Add to wishlist</button>
                </div>
                <div class="items">
                    <img src="ac.jpg" height="100" width="100">
                    <h3  style="font-family:Georgia, 'Times New Roman'">A.C</h3>
                    <p> price:$30.00</p>
                    <button>Add to wishlist</button>
                </div>
                <div class="items">
                    <img src="watch.jpg" height="100" width="100">
                    <h3  style="font-family:Georgia, 'Times New Roman'">Watch</h3>
                    <p>price:4.56</p>
                    <button>Add to wishlist</button>
                </div>
            </div>
            <div class="footer">Turning Clicks into Joyful Deliveries.<br>
            © 2026 YourStore. All Rights Reserved.
            </div>
        </div>

    </body>

</html>
