<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-image:url(45+\ Bleu\ pastel\ Wallpapers\ _\ Free\ download\ _\ Best\ Collection.jpg);
                background-position:center;
                background-color: antiquewhite;
                background-size:cover;
                background-repeat:no-repeat;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                margin:0;
            }
            .container{
                text-align:center;
                display:flex;
                justify-content:center;
                align-items:center;
                gap:30px;
                flex-direction:column;
            }
            .square{
                width:200px;
                height:200px;
                background-color:rgb(20, 1, 1);
                position:relative;
                animation-name:myanimation;
                animation-delay:3s;
                animation-duration:5s;
                animation-iteration-count:infinite;
                margin-top:20px;

            }
            @keyframes myanimation{
                0%{left:0px;top:0px;transform:rotate(0deg);}
                100% {left:0px;top:0px;transform:rotate(360deg);}
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 style="color:rgb(45, 6, 241);font-size:xx-large;">Infinite Rotating Square</h1>
           
            <p style="font-size:x-large">This square rotates 360 degrees continuosly using CSS animation</p>
            <div class="square"></div>
        </div>
        
    </body>
</html>
