<!DOCTYPE html>
<html>
    <head>
        <style>
            .container{
                text-align:center;
                display:flex;
                justify-content:center;
                align-items:center;
                gap:30px;
                flex-direction:column;
            }
            .ball{
                width:200px;
                height:200px;
                border-radius:50%;
                position: relative;
                animation-name:myanimation;
                animation-delay:3s;
                animation-duration:5s;
                animation-iteration-count:infinite;
                background-color:rgb(0, 0, 0);

            }
            @keyframes myanimation{
                0% {lft:0px;top:0px;}
                25% {lft:200px;top:0px;}
                50%{lft:200px;top:200px;}
                75%{lft: 0px;top:200px;}
                100%{lft:0px;top:0px;}
            }
            body{
                background-color: azure;

                
                
                display:flex;
                justify-content:center;
                align-items:center;
        
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 style="color:rgb(139, 0, 0);font-size: xx-large;">Infinite Bouncing Ball</h1>
        
            <p style="font-size: x-large;">This animation shows vertical movement using CSS</p>
            <div class="ball"></div>
        </div>
    </body>
</html>
